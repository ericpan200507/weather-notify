name: 贵阳天气预报推送

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  weather:
    runs-on: ubuntu-latest
    steps:
      - name: 获取天气并发送邮件
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        run: |
          python3 << 'EOF'
          import urllib.request, json, smtplib, os
          from email.mime.text import MIMEText
          from datetime import datetime, timedelta

          sender = os.environ["SENDER_EMAIL"]
          password = os.environ["SMTP_PASSWORD"]
          receiver = os.environ["RECEIVER_EMAIL"]

          # 获取天气
          with urllib.request.urlopen("https://wttr.in/Guiyang?format=j1", timeout=10) as resp:
              weather_data = json.loads(resp.read().decode())

          tomorrow = weather_data["weather"][1]
          max_temp = tomorrow.get("maxtempC", "N/A")
          min_temp = tomorrow.get("mintempC", "N/A")
          hourly = tomorrow.get("hourly", [{}])
          desc = hourly[0].get("weatherDesc", [{}])[0].get("value", "未知")
          rain = hourly[0].get("chanceofrain", "0")

          tomorrow_date = datetime.now() + timedelta(days=1)
          date_str = tomorrow_date.strftime("%Y年%m月%d日")

          max_t = int(max_temp) if max_temp.isdigit() else 25
          if max_t >= 28:
              clothing = "薄衬衫/短袖T恤，午间注意防暑"
          elif max_t >= 22:
              clothing = "长袖衬衫/薄卫衣，早晚注意增减衣物"
          else:
              clothing = "卫衣/薄外套，注意保暖"
          rain_tip = "务必带伞" if int(rain) >= 50 else "无需带伞"

          body = (
              f"【贵阳明日天气】\n"
              f"日期：{date_str}\n"
              f"天气：{desc}\n"
              f"温度：{min_temp}°C ~ {max_temp}°C\n"
              f"降雨概率：{rain}%\n\n"
              f"【穿衣建议】\n"
              f"建议：{clothing}\n\n"
              f"【出门提醒】\n"
              f"降雨概率 {rain}%，{rain_tip}\n"
          )

          msg = MIMEText(body, "plain", "utf-8")
          msg["Subject"] = f"贵阳明日天气提醒 - {date_str}"
          msg["From"] = sender
          msg["To"] = receiver

          server = smtplib.SMTP_SSL("smtp.qq.com", 465, timeout=15)
          server.login(sender, password)
          server.sendmail(sender, [receiver], msg.as_string())
          server.quit()
          print("邮件发送成功！")
          EOF
