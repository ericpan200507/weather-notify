name: 贵阳天气预报推送

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  weather:
    runs-on: ubuntu-latest

    steps:
      - name: 设置 Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 安装依赖
        run: npm install nodemailer

      - name: 获取天气并发送邮件
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const SENDER_EMAIL = process.env.SENDER_EMAIL;
            const SMTP_PASSWORD = process.env.SMTP_PASSWORD;
            const RECEIVER_EMAIL = process.env.RECEIVER_EMAIL;
            const https = require('https');
            const nodemailer = require('nodemailer');

            function getWeather() {
              return new Promise((resolve, reject) => {
                https.get('https://wttr.in/Guiyang?format=j1', (res) => {
                  let data = '';
                  res.on('data', (chunk) => { data += chunk; });
                  res.on('end', () => {
                    try { resolve(JSON.parse(data)); }
                    catch(e) { reject(e); }
                  });
                }).on('error', reject);
              });
            }

            async function main() {
              const weatherData = await getWeather();
              const weatherList = weatherData.weather;

              if (!weatherList || !Array.isArray(weatherList) || weatherList.length < 2) {
                console.error('天气数据结构异常:', JSON.stringify(weatherData));
                throw new Error('天气数据获取失败');
              }

              const tomorrow = weatherList[1];
              if (!tomorrow) {
                throw new Error('明天天气数据为空');
              }

              const maxtemp = parseInt(tomorrow.maxtempC) || 25;
              const mintemp = parseInt(tomorrow.mintempC) || 15;

              const weatherDescArr = tomorrow.weather || [];
              const weatherDesc = weatherDescArr.length > 0 && weatherDescArr[0] && weatherDescArr[0].desc
                ? weatherDescArr[0].desc
                : '多云';

              const now = new Date();
              const tomorrowDate = new Date(now);
              tomorrowDate.setDate(tomorrowDate.getDate() + 1);

              const year = tomorrowDate.getFullYear();
              const month = String(tomorrowDate.getMonth() + 1).padStart(2, '0');
              const day = String(tomorrowDate.getDate()).padStart(2, '0');
              const dateStr = year + '年' + month + '月' + day + '日';

              let maxRainChance = 0;
              const hourlyData = tomorrow.hourly || [];
              hourlyData.forEach(hour => {
                if (hour && hour.chanceofrain !== undefined) {
                  const rain = parseInt(hour.chanceofrain) || 0;
                  if (rain > maxRainChance) maxRainChance = rain;
                }
              });

              let clothingAdvice = '';
              if (maxtemp >= 28) {
                clothingAdvice = '- 上装：薄衬衫/短袖 T 恤\n- 下装：长裤/休闲裤\n- 备注：午间较热，注意防暑';
              } else if (maxtemp >= 22) {
                clothingAdvice = '- 上装：长袖衬衫/薄卫衣\n- 下装：长裤/牛仔裤\n- 备注：早晚温差较大，注意增减衣物';
              } else if (maxtemp >= 15) {
                clothingAdvice = '- 上装：卫衣/薄外套\n- 下装：长裤\n- 备注：建议穿外套，早晚偏凉';
              } else {
                clothingAdvice = '- 上装：厚外套/毛衣\n- 下装：保暖长裤\n- 备注：注意保暖，建议穿厚外套';
              }

              let rainAdvice = '';
              if (maxRainChance >= 80) {
                rainAdvice = '务必带伞！';
              } else if (maxRainChance >= 50) {
                rainAdvice = '备一把伞以防万一';
              } else {
                rainAdvice = '无需带伞';
              }

              const tempDiff = maxtemp - mintemp;
              const body = '贵阳明日天气\n' +
                '====================\n' +
                '日期：' + dateStr + '\n' +
                '天气：' + weatherDesc + '\n' +
                '温度：' + mintemp + '°C ~ ' + maxtemp + '°C\n' +
                '降雨概率：' + maxRainChance + '%\n' +
                '====================\n\n' +
                '穿衣建议\n' +
                '====================\n' +
                '温度：' + mintemp + '°C ~ ' + maxtemp + '°C\n' +
                '天气：' + weatherDesc + '\n' +
                clothingAdvice + '\n' +
                '====================\n\n' +
                '出门提醒\n' +
                '====================\n' +
                '降雨概率：' + maxRainChance + '%\n' +
                '建议：' + rainAdvice + '\n' +
                '温差：早晚温差 ' + tempDiff + '°C，注意增减衣物\n' +
                '====================\n\n' +
                '此邮件由 GitHub Actions 自动化任务每日 22:00 自动推送';

              const transporter = nodemailer.createTransport({
                host: 'smtp.qq.com',
                port: 465,
                secure: true,
                auth: {
                  user: SENDER_EMAIL,
                  pass: SMTP_PASSWORD
                }
              });

              await transporter.sendMail({
                from: SENDER_EMAIL,
                to: RECEIVER_EMAIL,
                subject: '贵阳明日天气提醒 - ' + dateStr,
                text: body
              });

              console.log('邮件发送成功');
            }

            main().catch(err => {
              console.error('错误:', err.message || err);
              process.exit(1);
            });
